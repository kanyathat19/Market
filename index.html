<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ink Market</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root/* for keeping the color*/
    {
      --green-dark: #1a3a2a;
      --green-mid: #2d6a4f;
      --green-light: #52b788;
      --green-pale: #b7e4c7;
      --cream: #f8f5ee;
      --orange: #e76f51;
      --yellow: #f4c430;
      --white: #ffffff;
    }
    * { margin:0;padding:0;box-sizing:border-box; }
    body /*For bottom background*/
    {
      font-family:'Sarabun', sans-serif;
      background:var(--cream);
      min-height:100vh;
      overflow-x:hidden;
    }
    header::before {
       content: '🥬🍄🥕🌽🥦🧅🍅🌿';
       font-size: 60px;
       position: absolute;
       top: 0; left: 0;
       width: 200%;
       opacity: 0.15;
       z-index: 0;
       white-space: nowrap;
       user-select: none;
       animation: scroll-emoji 20s linear infinite;
    }

     @keyframes scroll-emoji {
       from { transform: translateX(0); }
       to   { transform: translateX(-50%); }
     }
    header /*For background for header for Ink Market */
    {
      background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 60%, var(--green-light) 100%);
      padding: 40px 20px 60px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    header h1 /*For title Ink Market*/
    {
      font-family: 'Itim', cursive;
      font-size: clamp(2rem, 6vw, 3.5rem);
      color: var(--white);
      text-shadow: 2px 4px 12px rgba(0,0,0,0.3);
      letter-spacing: 2px;
      position: relative;
      z-index: 1;
    }
    header p /*For title Find for the location and the vegetables*/
    {
      color: var(--green-light);
      font-size: 1.1rem;
      margin-top: 8px;
    }

    /* For tab bar to switch between shop and vegetable*/
    .tab-bar 
    {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin: -28px auto 32px;
      max-width: 500px;
      padding: 0 16px;
      position: relative;
      z-index: 10;
    }
    .tab-btn/*For tab buttons*/
     {
      flex: 1;
      padding: 14px 10px;
      border: none;
      border-radius: 50px;
      font-family: 'Sarabun', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .tab-btn.shop /*For text color in shop tab*/
    {
      background: var(--white);
      color: var(--green-mid);
    }
    .tab-btn.veg /*For text color in vegetable tab*/
    {
      background: var(--white);
      color: var(--orange);
    }
    .tab-btn.shop.active /*For background color in shop tab*/
    {
      background: var(--green-mid);
      color: var(--white);
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(45,106,79,0.4);
    }
    .tab-btn.veg.active /*For background color in vegetable tab*/
    {
      background: var(--orange);
      color: var(--white);
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(231,111,81,0.4);
    }

    .panel /*For dividing location and vegetable*/
    {
      display: none;
      max-width: 700px;
      margin: 0 auto 40px;
      padding: 0 16px;
      animation: fadeUp 0.4s ease;
    }
    .panel.active /*For displaying active panel*/
    { display: block; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── SEARCH BOX ─── */
    .search-box /*For search box frame*/
    {
      background: var(--white);
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: 0 8px 40px rgba(26,58,42,0.1);
      margin-bottom: 24px;
    }
    .search-box label /*For search box label*/
    {
      display: block;
      font-weight: 700;
      color: var(--green-dark);
      margin-bottom: 10px;
      font-size: 1rem;
    }
    .input-row /*For input row*/
    {
      display: flex;
      gap: 10px;
    }
    .input-row input /*For input field in search box*/
    {
      flex: 1;
      padding: 12px 18px;
      border: 2px solid var(--green-pale);
      border-radius: 50px;
      font-family: 'Sarabun', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus { border-color: var(--green-light);}/*For border color when focus on input field*/
    .search-btn /*For search button in search box*/
    {
      padding: 12px 22px;
      border: none;
      border-radius: 50px;
      font-family: 'Sarabun', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    /* For search button color and hover effect in shop panel*/
    #panel-shop .search-btn { background: var(--green-mid); color: var(--white); }
    #panel-shop .search-btn:hover { background: var(--green-dark);}
    #panel-veg  .search-btn { background: var(--orange); color: var(--white); }
    #panel-veg  .search-btn:hover { background: #c1542a; }

    #result-shop,#result-veg /*For background of page*/
    {
      background: var(--white);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 8px 40px rgba(26,58,42,0.08);
      min-height: 80px;
    }
    .result-title /*For title of search result*/
    {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 16px;
      color: var(--green-dark);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .shop-card /*For shop card in search result of shop*/
    {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px dashed var(--green-pale);
    }
    .shop-card:last-child { border-bottom: none; }
    .shop-icon /*For shop icon in shop card*/
    {
      width: 48px; height: 48px;
      background: var(--green-pale);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; flex-shrink: 0;
    }
    .shop-info h3 { font-size: 1rem; color: var(--green-dark); font-weight: 700; }/*For shop name in shop card*/
    .shop-info p  { font-size: 0.88rem; color: #666; margin-top: 2px; }/*For shop details in shop card*/
    .shop-tag /*For zone text in shop card*/
    {
      display: inline-block;
      background: var(--green-pale);
      color: var(--green-mid);
      font-size: 0.75rem;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 20px;
      margin-top: 5px;
    }
    .veg-card /*For vegetable card in search result of vegetable*/
    {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px dashed #f0e8d8;
    }
    .veg-card:last-child { border-bottom: none;}/*For last vegetable card to remove border*/
    .veg-left { display: flex; align-items: center; gap: 12px;}/*For left part of vegetable card containing icon and name*/
    .veg-icon /*For vegetable icon in vegetable card*/
    {
      width: 44px; height: 44px;
      background: #fff3e0;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
    }
    .veg-name { font-weight: 700; font-size: 0.95rem; color: #333; }/*For vegetable name in vegetable card*/
    .veg-shop { font-size: 0.8rem; color: #999; margin-top: 2px; }/*For shop name in vegetable card*/
    .veg-price /*For vegetable price in vegetable card*/
    {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--orange);
      white-space: nowrap;
    }
    .veg-unit { font-size: 0.75rem; color: #aaa; font-weight: 400; }/*For vegetable price unit in vegetable card*/

    .empty-state /*For empty state and loading state*/
    {
      text-align: center;
      color: #bbb;
      padding: 20px 0;
      font-size: 0.95rem;
    }
    .loading-dots::after /*For animated dots in loading state*/
    {
      content: '...';
      animation: dots 1.2s steps(3, end) infinite;
    }
    @keyframes dots 
    {
      0%,20%  { content: '.'; }
      40%     { content: '..'; }
      60%,100%{ content: '...'; }
    }

    .port-hint /*For hint about port to run the backend server*/
    {
      background: #fffbe6;
      border: 1px solid #ffe58f;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 0.85rem;
      color: #7a5c00;
      margin-bottom: 20px;
      display: flex; align-items: flex-start; gap: 8px;
    }
    .port-hint span { flex: 1; }/* For text in port hint*/

    footer /*For footer text at the bottom of the page*/
    {
      text-align: center;
      padding: 24px;
      color: #aaa;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <!-- For header of page -->
<header>
  <h1>🥦 Ink Market 🥦 </h1>
  <p>Find for the location and the vegetables</p>
</header>

<!-- For tab bar of location and vegetables -->
<div class="tab-bar">
    <button class="tab-btn shop active" onclick="switchTab('shop')">🏪 Find for the location</button>
    <button class="tab-btn veg"  onclick="switchTab('veg')">🥕 Find for the vegetables</button>
</div>

<!-- For shop -->
<div class="panel active" id="panel-shop">
  <div class="search-box">
    <label>🔍 Find Shop</label>
    <div class="input-row">
      <input type="text" id="shop-input" placeholder="Enter shop name..." />
      <button class="search-btn" onclick="searchShop()">Find</button>
    </div>
  </div>
  <div id="result-shop">
    <div class="empty-state"> Type a shop name to search for its location</div>
  </div>
</div>

<!-- For vegetables -->
<div class="panel" id="panel-veg">
  <div class="search-box">
    <label>🔍 Find Vegetables</label>
    <div class="input-row">
      <input type="text" id="veg-input" placeholder="Enter vegetable name..." />
      <button class="search-btn" onclick="searchVeg()">Find</button>
    </div>
  </div>
  <div id="result-veg">
    <div class="empty-state">Type a vegetable name to search for its price</div>
  </div>
</div>

<script>
  const API = 'http://localhost:8080';/*For location of Java backend server*/

  function switchTab(tab) /*For switching between shop and vegetable tabs*/
  {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelector('.tab-btn.' + tab).classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
  }
  // For allows to search directly by pressing Enter,without having to press the search button.
  document.getElementById('shop-input').addEventListener('keydown', e => { if(e.key==='Enter') searchShop(); });
  document.getElementById('veg-input').addEventListener('keydown',  e => { if(e.key==='Enter') searchVeg(); });

  async function searchShop() //For searching shops based on input query and waiting for data from Java,the webpage can be displayed without freezing
  {
    // Get the query from input field and trim whitespace
    const q = document.getElementById('shop-input').value.trim();
    const box = document.getElementById('result-shop');
    if (!q) { box.innerHTML = '<div class="empty-state">Please enter a shop name</div>'; return; }// If query is empty, show a message and return

    box.innerHTML = '<div class="empty-state loading-dots">Searching...</div>';// For show loading of search result while waiting for response from Java backend server
    try {// Fetch shop data from Java backend server using the query, and wait for the response
      const res  = await fetch(`${API}/shop?name=${encodeURIComponent(q)}`);// For Send the search query to Java if response is successful, parse the JSON data
      const data = await res.json();
      renderShops(data, box, q);//This will result in it being displayed on the webpage.
    } catch(e) {// If there is error or don't have any shops,show error message in the result box
      box.innerHTML = '<div class="empty-state">Dont have any shops</div>';
    }
  }

  async function searchVeg() 
  {
    const q = document.getElementById('veg-input').value.trim();
    const box = document.getElementById('result-veg');
    if (!q) { box.innerHTML = '<div class="empty-state">Please enter a vegetable name</div>'; return; }

    box.innerHTML = '<div class="empty-state loading-dots">Searching...</div>';
    try {
      const res  = await fetch(`${API}/veg?name=${encodeURIComponent(q)}`);
      const data = await res.json();
      renderVegs(data, box, q);
    } catch(e) {
      box.innerHTML = '<div class="empty-state">Dont have any veggies</div>';
    }
  }

  //For output of searching shop
  const shopEmojis = ['🏪'];
  function renderShops(shops, box, q) 
  {
    if (!shops || shops.length === 0) 
    {
      box.innerHTML = `<div class="empty-state">Can't find "<strong>${q}</strong>"</div>`; return;
    }
    let html = `<div class="result-title">🏪 Found ${shops.length} shops</div>`;
    shops.forEach((s, i) => {
      html += `
        <div class="shop-card">
          <div class="shop-icon">${shopEmojis[i % shopEmojis.length]}</div>
          <div class="shop-info">
            <h3>${s.name}</h3>
            <p>📍 ${s.location}</p>
            <p>📞 ${s.phone}</p>
            <p>⏰ ${s.time}</p>
            <p></p>
            <span class="shop-tag">${s.zone || 'Market'}</span>
          </div>
        </div>`;
    });
    box.innerHTML = html;
  }

  //For output of searching vegetable
  const vegEmojis = {'Mushroom':'🍄','Shiitake mushrooms':'🍄','Spinach':'🌿','Carrot':'🥕','Corn':'🌽','Chinese cabbage':'🥬'
  ,'Broccoli':'🥦','Kale':'🥬','Eggplant':'🍆','Tomato':'🍅','Cabbage':'🥬','Bell Pepper':'🌶️','Cilantro':'🌿'
  ,'water spinach':'🥬','"Morning glory"':'🌸','Bok choy':'🥬','Zucchini':'🥒','Cauliflower':'🥦'};
  function vegIcon(name) { for(const k in vegEmojis) if(name.includes(k)) return vegEmojis[k]; return '🥗'; }

  function renderVegs(vegs, box, q) {
    if (!vegs || vegs.length === 0) {
      box.innerHTML = `<div class="empty-state">Can't find "<strong>${q}</strong>"</div>`; return;
    }
    let html = `<div class="result-title">🥕 Found ${vegs.length} items</div>`;
    vegs.forEach(v => {
      html += `
        <div class="veg-card">
          <div class="veg-left">
            <div class="veg-icon">${vegIcon(v.name)}</div>
            <div>
              <div class="veg-name">${v.name}</div>
              <div class="veg-shop">🏪 ${v.shop}</div>
            </div>
          </div>
          <div class="veg-price">${v.price} <span class="veg-unit">THB/${v.unit || 'kg.'}</span></div>
        </div>`;
    });
    box.innerHTML = html;
  }
</script>
</body>
</html>
